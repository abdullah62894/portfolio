name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore src/Portfolio.Web/Portfolio.Web.csproj

      - name: Build
        run: dotnet build src/Portfolio.Web/Portfolio.Web.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/Portfolio.Web/Portfolio.Web.csproj --configuration Release --no-build --output publish

      - name: Prepare deployment files
        shell: bash
        run: |
          # Determine base href from repository name
          REPO_NAME="${{ github.event.repository.name }}"
          if [ "${{ github.event.repository.owner.login }}" = "$REPO_NAME" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi

          echo "Using base href: $BASE_HREF"

          # Update base href in index.html for GitHub Pages path
          sed -i "s|<base href=\"/\"|<base href=\"$BASE_HREF\"|g" publish/wwwroot/index.html

          # Create 404.html for SPA routing fallback
          cp publish/wwwroot/index.html publish/wwwroot/404.html

          # List output for verification
          ls -la publish/wwwroot/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
